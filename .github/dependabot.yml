version: 2
updates:
  # npm deps — root (stdio package), worker, and the ext-apps UI.
  # Each directory is GROUPED into a single PR (patterns: ["*"]) so a refresh is
  # ~one PR per ecosystem, not one per dependency (avoids the first-run flood).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      root-deps:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      worker-deps:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      app-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
