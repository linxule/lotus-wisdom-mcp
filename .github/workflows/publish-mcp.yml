name: Release verification

# Publishing is done manually and is canonical: `npm publish` + `mcp-publisher
# publish` are run locally (npm OTP / GitHub OAuth don't fit unattended CI).
# This workflow does NOT publish — on a version tag it verifies that the tagged
# commit type-checks, tests, and builds cleanly, so a tag always marks a green,
# releasable state.

on:
  push:
    tags: ["v*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build package
        run: bun run build
