name: CI & publish

# Verification (typecheck + test + build) runs on every PR to main and on version
# tags. On a version tag it ALSO publishes — to npm AND the MCP Registry — both
# via GitHub OIDC, so there are NO secrets and nothing to expire:
#   - npm: requires a Trusted Publisher configured for this repo + this workflow
#     on npmjs.com (package Settings -> Trusted Publisher). npm >= 11.5.1
#     auto-detects the Actions OIDC and publishes with provenance, no token.
#   - MCP Registry: `mcp-publisher login github-oidc` proves ownership of the
#     io.github.linxule/* namespace.
#
# Release flow: bump src/shared/version.ts -> `bun run sync-version` -> commit ->
# `git tag vX.Y.Z && git push origin vX.Y.Z`. No tokens, no manual publish.

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

permissions:
  id-token: write # npm + mcp-publisher OIDC (tag runs only)
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Guard — tag must match package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          [ "$PKG" = "$GITHUB_REF_NAME" ] || { echo "Tag $GITHUB_REF_NAME != package $PKG"; exit 1; }

      - name: Publish to npm (tags only, OIDC Trusted Publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5.1
          npm publish --ignore-scripts

      - name: Publish to MCP Registry (tags only, GitHub OIDC)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
