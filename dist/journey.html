<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lotus Wisdom</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* Warm cream theme — the standalone fallback. Each neutral defers to a host
   style variable (--color-*) when the ext-apps host provides one, so the
   visualization adopts Claude's theme without losing its character when run
   standalone. Domain accent colors are vivid enough to read on either theme. */
:root {
  --bg: var(--color-background-primary, #faf8f5);
  --bg-c: var(--color-background-secondary, #f6f3ee);
  --hz: var(--color-border-secondary, #e2ddd4);
  --conn: var(--color-border-primary, #c8c2b6);
  --dim: var(--color-text-tertiary, #958e82);
  --mid: var(--color-text-secondary, #6b655c);
  --hi: var(--color-text-primary, #4a453e);
  --bright: var(--color-text-primary, #2c2824);
  --entry: #7a7a8c;
  --process: #a88430;
  --skillful: #b58a1c;
  --nondual: #2e7d42;
  --meta: #4068c8;
  --med: #2a8f7a;
  --mono: var(--font-mono, ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace);
  --sans: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
}

/* Dark fallback for hosts that signal a dark theme but supply no --color-*
   tokens (applyDocumentTheme sets data-theme). When the host does supply its
   own variables they still win via the var() fallbacks above. Accents are
   lifted for contrast against a dark background. */
:root[data-theme="dark"] {
  --bg: var(--color-background-primary, #1a1916);
  --bg-c: var(--color-background-secondary, #22211d);
  --hz: var(--color-border-secondary, #34322c);
  --conn: var(--color-border-primary, #4a473f);
  --dim: var(--color-text-tertiary, #8a8478);
  --mid: var(--color-text-secondary, #b6b0a4);
  --hi: var(--color-text-primary, #ddd7c9);
  --bright: var(--color-text-primary, #ece6d8);
  --entry: #a3a3b8;
  --process: #d4ad4e;
  --skillful: #e0b73f;
  --nondual: #5cc479;
  --meta: #7793e8;
  --med: #4bc3ac;
}

html, body {
  width: 100%;
  background: var(--bg);
  color: var(--mid);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

#root {
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 10px 16px 6px;
  position: relative;
}

#void {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 1.4s cubic-bezier(.4,0,.2,1);
  pointer-events: none; z-index: 1;
}
#void span { font-size: 20px; opacity: .08; animation: drift 80s linear infinite }
@keyframes drift { to { transform: rotate(360deg) } }

#tw {
  width: 100%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  height: 52px;
}
#tr { overflow: visible; width: 100%; max-height: 52px }

#ct {
  width: 100%; overflow-x: hidden;
  display: flex; justify-content: center;
  padding: 6px 8px 0;
  opacity: 0; transition: opacity .5s ease;
}
#ct.on { opacity: 1 }
#ct::-webkit-scrollbar { width: 2px }
#ct::-webkit-scrollbar-thumb { background: #ccc5b8; border-radius: 2px }
#ct::-webkit-scrollbar-track { background: transparent }

#ci {
  max-width: 560px; width: 100%;
  border-left: 2px solid var(--dim);
  padding-left: 14px;
  transition: opacity .22s ease, border-color .4s ease;
}

.ch {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 6px; flex-wrap: wrap;
}
#ch { font-family: var(--mono); font-size: 10px; letter-spacing: .05em }
#cd { font-size: 7px; text-transform: uppercase; letter-spacing: .22em; opacity: .7 }
#cn { font-size: 9px; opacity: .5; font-variant-numeric: tabular-nums; margin-left: auto }

#cx {
  font-size: 13.5px; line-height: 1.72;
  color: var(--bright);
  white-space: pre-wrap; word-wrap: break-word;
}
#cx.med-text { font-style: italic; opacity: .6 }

#jt {
  flex-shrink: 0; height: 14px; min-height: 14px;
  font-size: 8px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim); text-align: center;
  opacity: 0; transition: opacity 1.8s cubic-bezier(.4,0,.2,1) .6s;
}
#jt.on { opacity: 1 }

.sn circle.dot { transform-box: fill-box; transform-origin: center; cursor: pointer }
.sn { outline: none }
/* Keyboard focus ring — scoped to .fr so step animations never touch it. */
.sn:focus-visible .fr {
  opacity: .85;
  stroke: var(--hi);
  stroke-width: 1;
}
.fr { transform-box: fill-box; transform-origin: center; pointer-events: none }
.sn.now circle.dot {
  animation: emerge .55s cubic-bezier(.175,.885,.32,1.275) forwards,
             glow 3.2s ease-in-out .6s infinite;
}
.sn.hol circle.dot {
  animation: emerge .55s cubic-bezier(.175,.885,.32,1.275) forwards,
             inhale 4.4s ease-in-out .6s infinite;
}
.sn.past circle.dot { transition: opacity .35s ease }
.sn.past:hover circle.dot { opacity: .72 !important }
.sn.end circle.dot { opacity: .88 }
.rp {
  transform-box: fill-box; transform-origin: center;
  animation: ripple .9s ease-out forwards; pointer-events: none;
}

@keyframes emerge {
  from { transform: scale(0); opacity: 0 }
  to   { transform: scale(1); opacity: 1 }
}
@keyframes glow { 0%,100% { opacity: .72 } 50% { opacity: 1 } }
@keyframes inhale {
  0%,100% { transform: scale(1); opacity: .28 }
  50%     { transform: scale(1.45); opacity: .82 }
}
@keyframes ripple {
  from { transform: scale(1); opacity: .35 }
  to   { transform: scale(5.5); opacity: 0 }
}
@keyframes draw {
  from { stroke-dashoffset: var(--len) }
  to   { stroke-dashoffset: 0 }
}
@keyframes ambient { 0%,100% { opacity: .06 } 50% { opacity: .12 } }
</style>
